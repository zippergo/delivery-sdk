      description: Registers a new webhook for the current user. Returns 409 Conflict
        if a webhook with the same callback URL already exists.
      operationId: createWebhook
      parameters:
      - description: "Language preference for response content. Supported: en, he"
        explode: false
        in: header
        name: Accept-Language
        required: false
        schema:
          default: en
          enum:
          - en
          - he
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
        required: true
      responses:
        "201":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/WebhookDTO'
          description: Webhook created
        "400":
          description: Invalid request parameters
        "403":
          description: Forbidden — insufficient permissions
        "409":
          description: Webhook with this callback URL already exists
        "500":
          description: Internal server error
      summary: Create a webhook
      tags:
      - Webhooks
      x-content-type: application/json
      x-accepts:
      - '*/*'
  /delivery/v1/webhooks/test:
