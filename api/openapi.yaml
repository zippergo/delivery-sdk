        pickupReferenceNumber: INV-2026-78432
        location:
          address:
            country: IL
            city: Tel Aviv
            street: Dizengoff St
            fullAddress: 123
            postcode: 6100000
            intercom: 4521
            addressPlace:
              provider: google
              id: ChIJN1t_tDeuEmsRUsoyG83frY4
            state: Tel Aviv District
            house: 123
            apartmentNumber: 12A
          lng: 34.7818
          lat: 32.0853
        email: john@example.com
      properties:
        name:
          description: Contact person name
          example: John Doe
          maxLength: 200
          minLength: 0
          type: string
        phone:
          description: Contact phone number
          example: "+972501234567"
          minLength: 1
          type: string
        email:
          description: Contact email address
          example: john@example.com
          type: string
        notes:
          description: Notes or instructions for the driver
          example: "Floor 3, door code 1234"
          maxLength: 500
          minLength: 0
          type: string
        pickupReferenceNumber:
          description: "Pickup reference number used by the driver to collect the\
            \ package (e.g., invoice number, order reference, or warehouse release\
            \ code)"
