      x-accepts:
      - '*/*'
    put:
      operationId: updatePickupLocation
      parameters:
      - description: Pickup location ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: "Language preference for response content. Supported: en, he"
        explode: false
        in: header
        name: Accept-Language
        required: false
        schema:
          default: en
          enum:
          - en
          - he
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePickupLocationRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PickupLocationDTO'
          description: Pickup location updated
        "400":
          description: Validation error
        "404":
          description: Not found
      summary: Update a pickup location
      tags:
      - Pickup Locations
      x-content-type: application/json
      x-accepts:
      - '*/*'
  /delivery/v1/webhooks:
