        required: false
        schema:
          default: en
          enum:
          - en
          - he
          type: string
        style: simple
      responses:
        "200":
          content:
            '*/*':
              schema:
                format: binary
                type: string
          description: Asset returned
        "400":
          description: Invalid filename
        "404":
          description: Delivery not found
      summary: Download a label asset
      tags:
      - Deliveries
      x-accepts:
      - '*/*'
  /delivery/v1/deliveries/{deliveryId}:
