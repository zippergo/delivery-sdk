      - location
      - name
      - phone
    HubCreateDeliveryRequest:
      description: Request to create a new delivery order. A quoteId from a prior
        quote request is required; pickup and dropoff must match the quoted addresses.
      example:
        handshake:
          isRequired: true
          sendSmsToDropoffContact: true
        smsNotifications: true
        providerData:
          subCustomerId: 0
          customerCompanyName: My Store
          customerId: 39700
          token: 84957612
        deliveryType: FOOD_IMMEDIATE
        dropoff:
          notes: "Floor 3, door code 1234"
          phone: "+972501234567"
          name: John Doe
          pickupReferenceNumber: INV-2026-78432
          location:
            address:
              country: IL
              city: Tel Aviv
              street: Dizengoff St
              fullAddress: 123
              postcode: 6100000
              intercom: 4521
              addressPlace:
                provider: google
                id: ChIJN1t_tDeuEmsRUsoyG83frY4
              state: Tel Aviv District
              house: 123
              apartmentNumber: 12A
            lng: 34.7818
            lat: 32.0853
          email: john@example.com
        pickup:
          notes: "Floor 3, door code 1234"
          phone: "+972501234567"
          name: John Doe
          pickupReferenceNumber: INV-2026-78432
          location:
            address:
              country: IL
              city: Tel Aviv
              street: Dizengoff St
              fullAddress: 123
              postcode: 6100000
              intercom: 4521
              addressPlace:
                provider: google
                id: ChIJN1t_tDeuEmsRUsoyG83frY4
              state: Tel Aviv District
              house: 123
              apartmentNumber: 12A
            lng: 34.7818
            lat: 32.0853
          email: john@example.com
        pickupLocationCode: MAIN-01
        externalOrderId: ORD-12345
        quoteId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        codAmount: 49.9
        recipient:
          phoneNumber: "+972501234567"
          name: John Doe
          email: john@example.com
        items:
        - quantity: 2
          name: Burger Meal
          description: "No onions, extra sauce"
          sku: BURGER_MEAL_001
        - quantity: 2
          name: Burger Meal
          description: "No onions, extra sauce"
          sku: BURGER_MEAL_001
        scheduledAt: 2026-03-01T14:00:00Z
      properties:
        quoteId:
          description: Quote ID from a prior quote request
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          format: uuid
          type: string
        deliveryType:
          description: Type of delivery
          enum:
          - STORE_IMMEDIATE
          - FOOD_IMMEDIATE
          - STORE_NEXT_DAY
          example: FOOD_IMMEDIATE
          type: string
        externalOrderId:
          description: Your external order reference ID
          example: ORD-12345
          type: string
        pickup:
          $ref: '#/components/schemas/HubContactDTO'
        dropoff:
          $ref: '#/components/schemas/HubContactDTO'
        items:
          description: List of items to deliver
          items:
            $ref: '#/components/schemas/HubItemDTO'
          type: array
        codAmount:
          description: Cash-on-delivery amount (null if not COD)
          example: 49.9
          type: number
        scheduledAt:
          description: Scheduled pickup time (null for immediate dispatch)
          example: 2026-03-01T14:00:00Z
          format: date-time
          type: string
        smsNotifications:
          description: |-
            Content for the SMS message(s) which will be sent to the recipient at certain stages of the delivery.

            This is an optional feature for communicating the tracking link to the recipient.
          type: boolean
        handshake:
          $ref: '#/components/schemas/HandshakeDeliveryDTO'
        recipient:
          $ref: '#/components/schemas/RecipientDeliveryDTO'
        providerData:
          $ref: '#/components/schemas/ProviderDataDTO'
        pickupLocationCode:
          description: "Optional pickup location code. When set, pickup contact and\
            \ address are auto-filled from the location."
          example: MAIN-01
          type: string
      required:
      - deliveryType
      - dropoff
      - quoteId
