components:
  schemas:
    CallbackConfigDTO:
      description: Callback delivery configuration
      example:
        exponentialRetryBackoff:
          exponentBase: 5
          maxRetryCount: 3
      properties:
        exponentialRetryBackoff:
          $ref: '#/components/schemas/ExponentialRetryBackoffDTO'
    ExponentialRetryBackoffDTO:
      description: Exponential backoff retry configuration
      example:
        exponentBase: 5
        maxRetryCount: 3
      properties:
        exponentBase:
          description: Base for the exponential delay calculation (delay = base^attempt
            seconds)
          example: 5
          format: int32
          type: integer
        maxRetryCount:
          description: Maximum number of retry attempts
          example: 3
          format: int32
          type: integer
    UpdateWebhookRequest:
      description: Request to update an existing webhook subscription. All fields
        are optional; only provided fields will be updated.
      example:
        callbackConfig:
          exponentialRetryBackoff:
            exponentBase: 5
            maxRetryCount: 3
        callbackUrl: https://example.com/webhooks/updated
        eventTypes:
        - status_changed
        - test_event
        enabled: true
      properties:
        callbackUrl:
          description: HTTPS URL that will receive webhook events
          example: https://example.com/webhooks/updated
          maxLength: 2048
          minLength: 0
          type: string
        enabled:
          description: Whether the webhook is active
          example: true
          type: boolean
        eventTypes:
          description: Event types to subscribe to
          example:
          - status_changed
          - test_event
          items:
            type: string
          maxItems: 2147483647
          minItems: 1
          type: array
        callbackConfig:
          $ref: '#/components/schemas/CallbackConfigDTO'
    WebhookDTO:
      description: Webhook subscription details
      example:
        callbackConfig:
          exponentialRetryBackoff:
            exponentBase: 5
            maxRetryCount: 3
        createdAt: 2000-01-23T04:56:07.000+00:00
        callbackUrl: https://example.com/webhooks
        clientSecret: clientSecret
        id: 1
        eventTypes:
        - DELIVERY_STATUS_CHANGED
        enabled: true
        updatedAt: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          description: Webhook ID
          example: 1
          format: int64
          type: integer
        callbackUrl:
          description: Callback URL receiving events
          example: https://example.com/webhooks
          type: string
        enabled:
          description: Whether the webhook is active
          example: true
          type: boolean
        eventTypes:
          description: Subscribed event types
          example:
          - DELIVERY_STATUS_CHANGED
          items:
            type: string
          type: array
        callbackConfig:
          $ref: '#/components/schemas/CallbackConfigDTO'
        createdAt:
          description: Creation timestamp
          format: date-time
          type: string
        updatedAt:
          description: Last update timestamp
          format: date-time
          type: string
        clientSecret:
          description: HMAC secret for verifying webhook signatures (only returned
            on creation)
