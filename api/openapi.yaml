                $ref: '#/components/schemas/InternalPickupLocationDTO'
          description: Location not found
      summary: Get pickup location by external ID
      tags:
      - Internal - Pickup Locations
      x-accepts:
      - '*/*'
  /delivery/v1/echo:
    get:
      description: Returns the provided message along with the API version. Useful
        for connectivity checks.
      operationId: echoV1
      parameters:
      - description: Message to echo back
        explode: true
        in: query
        name: message
        required: false
        schema:
