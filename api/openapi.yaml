          description: Tracking information returned
        "404":
          description: Delivery not found
        "429":
          description: Rate limit exceeded
      summary: Track a delivery by tracking number
      tags:
      - Public Tracking
      x-accepts:
      - '*/*'
  /delivery/v1/internal/pickup-locations/{id}:
    get:
      description: Returns pickup location metadata. Used for service-to-service validation.
      operationId: getById
      parameters:
      - explode: false
        in: path
        name: id
