openapi: 3.1.0
info:
  contact: {}
  description: |
    This API exposes endpoints.

    ## Authentication

    All API endpoints require a **Bearer JWT token** in the `Authorization` header.

    Tokens are issued by the **Auth Service** via OAuth2 client credentials flow.

    ### Obtain a token

    ```
    POST {auth-service-url}/oauth/token
    Authorization: Basic Base64(apiKey:apiSecret)
    Content-Type: application/x-www-form-urlencoded

    grant_type=client_credentials
    ```

    Credentials must be provided via **HTTP Basic Authentication** (Base64-encoded `apiKey:apiSecret`).

    ### Use the token

    ```
    Authorization: Bearer {access_token}
    ```

    > Contact your administrator to obtain API credentials (apiKey / apiSecret).
  license:
    name: Proprietary
  title: Delivery Api Service
  version: v1
servers:
- url: /
security:
- bearerAuth: []
tags:
- description: "Create, quote, and track deliveries across carrier providers"
  name: Deliveries
- description: Admin endpoints for viewing and searching deliveries across all users
  name: Admin Deliveries
- description: Service-to-service pickup location operations
  name: Internal - Pickup Locations
- description: Manage pre-configured pickup locations for deliveries
  name: Pickup Locations
- description: Manage webhook subscriptions for real-time event notifications
  name: Webhooks
- description: Echo / connectivity check for API v1
  name: Echo
- description: Public delivery tracking — no authentication required
  name: Public Tracking
paths:
  /delivery/v1/webhooks/{id}:
    delete:
      description: Removes a specific webhook subscription by ID for the current user.
      operationId: deleteWebhookById
      parameters:
      - description: Webhook ID
        example: 1
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      - description: "Language preference for response content. Supported: en, he"
        explode: false
        in: header
        name: Accept-Language
        required: false
        schema:
          default: en
          enum:
          - en
          - he
          type: string
        style: simple
      responses:
        "204":
          description: Webhook deleted
        "403":
          description: Forbidden — insufficient permissions
        "404":
          description: Webhook not found
        "500":
          description: Internal server error
      summary: Delete a specific webhook
      tags:
      - Webhooks
      x-accepts:
      - application/json
    put:
      description: Updates an existing webhook subscription by ID for the current
        user.
      operationId: updateWebhook
      parameters:
      - description: Webhook ID
        example: 1
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      - description: "Language preference for response content. Supported: en, he"
        explode: false
        in: header
        name: Accept-Language
        required: false
        schema:
          default: en
          enum:
          - en
          - he
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/WebhookDTO'
          description: Webhook updated
        "400":
          description: Invalid request parameters
        "403":
          description: Forbidden — insufficient permissions
        "404":
          description: Webhook not found
        "409":
          description: Webhook with this callback URL already exists
        "500":
          description: Internal server error
      summary: Update a webhook
      tags:
      - Webhooks
      x-content-type: application/json
      x-accepts:
      - '*/*'
  /delivery/v1/pickup-locations/{id}:
