  /delivery/v1/pickup-locations/bulk-upsert:
    post:
      description: "Accepts a batch of pickup locations for create or update. Matching\
        \ is by `code` — existing codes are updated, new codes are created. Processing\
        \ is asynchronous via message queue. On completion, a webhook event `pickup_location_bulk_upsert_completed`\
        \ is sent with results and any errors."
      operationId: bulkUpsertPickupLocations
      parameters:
      - description: "Language preference for response content. Supported: en, he"
        explode: false
        in: header
        name: Accept-Language
        required: false
        schema:
          default: en
          enum:
          - en
          - he
          type: string
        style: simple
      requestBody:
